#map-container{position:absolute;transform-origin:0 0}

.tl-hotspot{cursor:pointer;pointer-events:all}
.tl-pulse{fill:none;stroke-width:2;opacity:0;pointer-events:none}

.layer-row:hover{color:#c8d8f0}

.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-line{width:16px;height:3px;flex-shrink:0}

<script>
const INFO={"Ytterby-7": {"x": 1106.31, "y": 1056.31, "faction": "neutral", "tag": "Galactic Centre · Polar Origin", "body": "The galactic anchor and polar origin of all Accord cartography. Every bearing (degrees) and range (kilo-light-years) on the chart is measured from this point.", "stats": {"Role": "Polar origin", "Bearing ref": "0°/360°"}}, "T.R.A.C.E.": {"x": 1350.57, "y": 1007.07, "faction": "denebol", "tag": "Stargate · Pol System Access", "body": "Transport Access – Central Embassy. The sole Stargate access point and the international embassy for Panthalassa, where off-world nations meet for trade and diplomacy. Neutral ground — no weapons permitted. CO: Col. Everett Johnson. Reverse-engineered from a recovered Praetorian fragment; CAST technology carries an uncontrolled temporal component.", "stats": {"Type": "Stargate / Embassy", "Access": "Restricted", "Dist. to Panthal": "~2,000 ly"}}, "Pol_System": {"x": 1324.66, "y": 967.55, "faction": "accord", "tag": "Pol Star System · Accord Capital System", "body": "The cradle of Denebolian civilisation and administrative core of the <strong>Denebolian Accord Alliance</strong>, organised around the stable G-type <strong>Pol Star</strong>. Of eight major bodies plus the dwarf planet Atrière and the Matrichal Comet, only <strong>Panthalassa</strong> supports natural habitation — the shared capital world of all three Accord nations.<br><br><strong>Panthalassa (Yavanna) — 4th orbit, Class M, fully habitable.</strong> A stable ~18 °C climate, breathable N₂–O₂ atmosphere and vast hydrosphere support a large, technologically advanced population spread across continents, archipelagos and artificial oceanic structures. Two moons, <strong>Thalor</strong> and <strong>Ione</strong>, drive strong but predictable tides. Panthal hosts the Accord's primary governing institutions, the major interplanetary trade hubs, and command-level STARS infrastructure; its orbital space is densely developed as the central node of the system.<br><br><strong>System bodies (inner→outer):</strong> Aurorium (Melkor) · Caelum · Aquiluna · <strong>Panthalassa (Yavanna)</strong> · Gaistra · Exlipta · Luminae (Irmo) · dwarf planet Atrière · Matrichal Comet.", "stats": {"Star": "Pol Star (G2V)", "Capital world": "Panthalassa (Yavanna)", "Class": "M · fully habitable", "Environment": "4th orbit · 1 Py · ~18 °C · N₂–O₂", "Moons": "Thalor, Ione", "Governments": "Republics & Kingdom", "Population": "35,403,609 (+~1M in stasis)", "Tech tier (avg)": "Tier II 38%", "Sorcery tier (avg)": "Tier I 50%", "Bodies": "8 + dwarf + comet"}, "link": "https://www.triarc.cz/pol-star-system/", "linkLabel": "Open Pol Star System →"}, "Visian_Black_Hole": {"x": 457.13, "y": 1325.85, "faction": "neutral", "tag": "Spatial Anomaly · Gravity Well", "body": "A black hole in the western galactic quadrant. A significant navigation hazard — FTL lanes maintain mandatory safe-distance buffers.", "stats": {"Class": "Gravity well", "Lane buffer": "Mandatory"}}, "Magellan_Void": {"x": 849.2, "y": 1705.6, "faction": "neutral", "tag": "Uncharted Region · Navigation Hazard", "body": "A vast uncharted region south of the galactic mid-circle. No established FTL corridors cross the Void. Long-range survey classification pending.", "stats": {"Status": "Uncharted", "Corridors": "None"}}, "Lal_Nebula": {"x": 1461.2, "y": 907.3, "faction": "neutral", "tag": "Stellar Nebula", "body": "A dense stellar gas formation near the Denebolian–Draconian frontier. Scatters sensors and complicates FTL navigation.", "stats": {"Type": "Nebula", "Effect": "Sensor scatter"}}, "Zen_Supernova": {"x": 308.73, "y": 606.22, "faction": "neutral", "tag": "Stellar Remnant · Supernova", "body": "A catalogued supernova remnant in the far western reaches, used as a navigation landmark.", "stats": {"Type": "Supernova remnant"}}, "Neutral_Safety_Zone": {"x": 1107.5, "y": 1056.31, "faction": "neutral", "tag": "Accord Demilitarised Belt", "body": "The inner demilitarised belt surrounding Ytterby-7. A natural gravitational hazard region maintained as neutral space; no faction may station combat assets here without Council approval.", "stats": {"Basis": "Accord", "Status": "Demilitarised"}}, "Danger_Zone": {"x": 1108.07, "y": 1057.26, "faction": "neutral", "tag": "Deep-Space Hazard Zone", "body": "The innermost hazard zone around the galactic centre — extreme gravitational and radiation conditions. Transit prohibited.", "stats": {"Status": "Prohibited"}}, "Oblio_System": {"x": 1395.91, "y": 1144.25, "faction": "denebol", "tag": "Denebolian Republic System", "body": "A Denebolian Republic system, SHIELD/STARS administered.", "stats": {"Admin": "SHIELD/STARS"}}, "Tigris-V": {"x": 1380.14, "y": 1109.25, "faction": "denebol", "tag": "Denebolian Republic System", "body": "Tigris-V — a Denebolian Republic system.", "stats": {"Admin": "SHIELD/STARS"}}, "La_Grie": {"x": 1323.54, "y": 1148.08, "faction": "denebol", "tag": "Denebolian Republic System", "body": "La Grie — a Denebolian Republic system.", "stats": {"Admin": "SHIELD/STARS"}}, "Hala": {"x": 1341.7, "y": 1070.99, "faction": "denebol", "tag": "Denebolian Republic System", "body": "Hala — a Denebolian Republic system.", "stats": {"Admin": "SHIELD/STARS"}}, "Vortex_Station": {"x": 1232.68, "y": 1067.63, "faction": "denebol", "tag": "Denebolian Installation", "body": "Vortex Station — a Denebolian deep-space installation supporting fleet logistics and traffic control.", "stats": {"Type": "Station"}}, "Tlio_System": {"x": 1427.01, "y": 1072.95, "faction": "denebol", "tag": "Denebolian Republic System", "body": "Tlio — a Denebolian Republic system.", "stats": {"Admin": "SHIELD/STARS"}}, "Nexalabiris-3": {"x": 285.0, "y": 1057.5, "faction": "denebol", "tag": "Classified SHIELD Outpost", "body": "Nexalabiris-3 — a remote, classified SHIELD outpost in the far west. Lore WIP.", "stats": {"Status": "Classified", "Admin": "SHIELD"}}, "Olga": {"x": 1248.19, "y": 961.11, "faction": "accord", "tag": "Accord Core System", "body": "Part of the Denebolian Accord shared core systems.", "stats": {"Status": "Accord shared"}}, "Gamma": {"x": 1274.72, "y": 1016.27, "faction": "accord", "tag": "Accord Core System", "body": "An Accord shared core system in the central cluster.", "stats": {"Status": "Accord shared"}}, "Pattera": {"x": 1412.14, "y": 1030.78, "faction": "accord", "tag": "Accord Core System", "body": "Part of the Accord shared core systems.", "stats": {"Status": "Accord shared"}}, "Delta": {"x": 1414.4, "y": 974.33, "faction": "accord", "tag": "Accord Core System", "body": "An Accord shared core system.", "stats": {"Status": "Accord shared"}}, "Echo": {"x": 1343.29, "y": 873.21, "faction": "accord", "tag": "Accord Core System", "body": "Part of the Accord shared core systems.", "stats": {"Status": "Accord shared"}}, "Morwe_Gad": {"x": 1670.27, "y": 885.09, "faction": "arnor", "tag": "Kingdom of Arnor · Morwe Gad — Homeworld of the Morwen", "body": "Habitable, populated. Twin continents — northern <strong>Tir Eira</strong> and southern <strong>Tir Poeth</strong> — joined by the storm-flooded land bridge <strong>Pont y Byd</strong>. Orange dwarf star, one moon, ~29% land. The <strong>Morwen</strong> descend from Norse settlers transplanted from the island of Mornaw (~850 AD) via an ancient space monolith; long contested with the native Xuu-waz. Site of the Morwen Relocation (11–12.2023).", "stats": {"Species": "Morwen", "Habitable": "Yes", "Admin": "ARSN"}, "link": "https://www.triarc.cz/morwen/", "linkLabel": "Open Morwen →"}, "Valei": {"x": 484.92, "y": 474.01, "faction": "arnor", "tag": "Kingdom of Arnor · Valei — Homeworld of the Valheini", "body": "Habitable, populated. A small tidal-locked planet orbiting an unusually stable red dwarf; thick atmosphere, fierce winds and rain. The <strong>Valheini</strong> are reptilian humanoids — white scutes, infrared sight, horned \"crowns\" marking maturity — with a deep kinship culture and ritual champion combat. Radiation-resistant; ~170 cm.", "stats": {"Species": "Valheini", "Habitable": "Yes", "Admin": "ARSN"}, "link": "https://www.triarc.cz/valheini/", "linkLabel": "Open Valheini →"}, "Narnos": {"x": 1017.55, "y": 840.34, "faction": "arnor", "tag": "Kingdom of Arnor · Narnos — Homeworld of the Naru", "body": "Habitable, populated. An ocean world of countless islands. The <strong>Naru</strong> are peaceful maritime traders who built a federation of island states; nearly annihilated by Barbarians and a desperate nuclear armageddon before Arnor liberated and resettled them. Now they run interplanetary trade and mediation across the Arnorian realm.", "stats": {"Species": "Naru", "Habitable": "Yes", "Admin": "ARSN"}, "link": "https://www.triarc.cz/naru/", "linkLabel": "Open Naru →"}, "Syl": {"x": 1812.5, "y": 1057.5, "faction": "arnor", "tag": "Kingdom of Arnor · Syl — Homeworld of the Sylvans", "body": "Habitable, populated. A forest moon orbiting a gas giant (which holds a dormant etheric entity of enormous power) around an orange dwarf; two grey submoons, 76% ocean, continents of jungle, forest and taiga. The <strong>Sylvans</strong> are tall, long-eared, mana-using humanoids, long-lived and athletic, their biology shaped by the entity.", "stats": {"Species": "Sylvans", "Habitable": "Yes", "Admin": "ARSN"}, "link": "https://www.triarc.cz/sylvans/", "linkLabel": "Open Sylvans →"}, "Lamös": {"x": 1736.47, "y": 485.34, "faction": "arnor", "tag": "Kingdom of Arnor · Lamös — Homeworld of the Lataies", "body": "Habitable, populated. A heavily developed garden world wreathed in artificial rings and satellite palaces; yellow dwarf star, only ~9% land. A Mediterranean-style paradise of wine, olive, fig and citrus, its cities woven into warm mountains and valleys. Home of the <strong>Lataies</strong>.", "stats": {"Species": "Lataies", "Habitable": "Yes", "Admin": "ARSN"}, "link": "https://www.triarc.cz/lataies/", "linkLabel": "Open Lataies →"}, "Dotrina": {"x": 1554.77, "y": 1022.19, "faction": "praetorian", "tag": "Fifth Praetorian Belt · Dotrina — the Serene Heart", "body": "The soul of the <strong>Fifth Praetorian Belt</strong> — the world of training, religion, and cultural tradition, where the realm forges its warriors from childhood. An M-class world larger than Praetoria, with a longer year of some <strong>400 Panthalassan days</strong>, a near-perfect climate for life and agriculture, and diverse flora and fauna — the life-bearing vine that feeds the realm. Its architecture blends the <strong>medieval and the Chinese</strong> of a corresponding age: disciplined, graceful, old. Where Praetoria is grand and Communa is loud, Dotrina is calm; its people are deep and kind, yet disciplined and deeply traditional. Capital: <strong>Palus Campi</strong>.", "stats": {"Realm": "Fifth Praetorian Belt", "Role": "Heart — training, religion, culture", "Class": "M · life-bearing", "Capital": "Palus Campi", "Year": "~400 Panthal days", "Habitable": "Yes · near-perfect for agriculture", "Character": "Disciplined, traditional, calm"}}, "Communa": {"x": 1540.83, "y": 946.6, "faction": "praetorian", "tag": "Fifth Praetorian Belt · Communa — the Layered City-World", "body": "The world of the common people of the <strong>Fifth Praetorian Belt</strong> — an L-class world given over almost wholly to a single vast, many-tiered city, with only scattered vegetation and no native animal life. It lies close enough to its star that the surface turns barely habitable for parts of the year, so its greenery and higher classes live deeper beneath the surface. The realm's <strong>trading centre</strong> — markets everywhere, someone forever selling or stealing — drawing its wealth from rich mineral deposits and the orbital mines of its planetary rings, the source of the Belt's <strong>strategic shielding ore</strong>. Its people are a diverse, friendly churn of soon-to-be knights, sellers, thieves, travellers and miners — yet non-knights here are treated the most poorly of any in the realm, and Communa is the poorest of the three worlds. The Denebolian Republic is actively pressing the Belt government to improve conditions here. Population in the several hundreds of millions.", "stats": {"Realm": "Fifth Praetorian Belt", "Role": "Trade centre · common people", "Class": "L · layered city-world", "Population": "Several hundred million", "Habitable": "Partly — subsurface living", "Resource": "Shielding ore (orbital ring mines)", "Status": "Poorest of the three worlds", "Denebol": "Pressing to improve conditions"}}, "Praetoria": {"x": 1573.37, "y": 987.03, "faction": "praetorian", "tag": "Fifth Praetorian Belt · Sovereign Warrior-Realm", "body": "Capital world of the <strong>Fifth Praetorian Belt</strong>, a sovereign warrior-realm spread across three worlds (Praetoria, Dotrina, Communa) descended from a surviving regiment of the ancient Praetoria empire. A mountainous M-class world of grand cities in a <strong>monumental medieval style</strong> — vast, splendid, and quietly hollowing as its once-advanced technology decays year by year. Its mountains leave little room for agriculture or mass habitation, so it leans on its sister worlds. Seat of the warrior-nobility and government, under <strong>Lord-Praefect Rammeus Tiddeal</strong>. Its people are honourable and noble — proud to the point of arrogance toward Belt folk of the other two worlds. The Belt trades strategic shielding ore for Denebolian technology and ship refits, and is a founding signatory of the <strong>Blue Eagle Treaty</strong>.", "stats": {"Realm": "Fifth Praetorian Belt", "Role": "Capital world · seat of government", "Class": "M · mountainous", "Government": "Stratocracy · Lord-Praefect", "Head of state": "Lord-Praefect Rammeus Tiddeal", "Style": "Monumental medieval", "Trade asset": "Strategic shielding ore", "Treaty": "Blue Eagle (founding signatory)", "Ambassador": "Victoria Hartwell"}}, "Dragga": {"x": 1421.09, "y": 811.96, "faction": "draconir", "tag": "Draconis Empire System", "body": "A system of the Draconis Empire — a powerful Accord-allied imperial state.", "stats": {"Allegiance": "Draconis Empire"}}, "Fang": {"x": 1469.22, "y": 820.91, "faction": "draconir", "tag": "Draconis Empire System", "body": "A Draconis Empire system.", "stats": {"Allegiance": "Draconis Empire"}}, "Orbitum_System": {"x": 1568.9, "y": 1147.45, "faction": "neutral", "tag": "Orbitum Accord · Protectorate & Accord Observer", "body": "Home of the <strong>Bitherigs</strong> — three founding peoples (Rigans of Riga Facili, Thelerans of Thelo, Biathites of Biath Varun) whose homeworlds were destroyed when a rogue black hole crossed their system. They consolidated on <strong>Orbithia</strong> (5th planet, 4th habitable world; Panthal-like but colder, 435-day year, 32-hour day), abandoning old hostilities even before contact with Denebol. Governed by a <strong>Triune Presidency</strong> with a rotating First Seat. Tier I tech (~75%) with advanced data-archival technology and FTL only recently in testing. A Denebolian protectorate under the <strong>Orbithian Compact</strong> (with a graduation pathway to resumed sovereignty), and an Accord Observer under the Orbitum Observer Status Agreement.", "stats": {"Homeworld": "Orbithia (5th planet)", "People": "Bitherigs", "Government": "Triune Presidency", "Tech tier": "Tier I (~75%)", "Status": "Protectorate · Accord Observer", "Compact": "DSG260625MFA", "Observer Agr.": "DA260625CFAD"}}, "Gori_Merchant_Fleet": {"x": 1357.31, "y": 706.89, "faction": "gori", "tag": "Gori Merchant Fleet · Stateless Nomadic Ally", "body": "A stateless, nomadic trading people — <strong>no homeworld, no territory; they are a fleet.</strong> Naturally suspicious, fierce hagglers, peaceful by disposition but willing to trade with anyone, friend or foe. Most of the galaxy's black markets operate aboard Gori ships, and Denebol holds <strong>no jurisdiction on any Gori deck</strong> — a sovereignty Denebol quietly values as a deniable grey-market channel. Charted by a DASF reconnaissance vessel in 2022; the main fleet hides in the asteroid belt of the binary pulsar <strong>XA5-066</strong> (Aldeesa sector), where approaching ships mistake it for debris. Beta Chapter posts four Horizon-class warships to protect them. Signatory of the <strong>Vadeelan Nebula Treaty</strong> (offensive mutual defence, alongside Eskana and the Draconis Empire); they run <strong>Gori Bank</strong> inside Denebol, dealing in Gori Trade Units. Governed as a plutocracy under the <strong>Master of the Ledger</strong> (by custom the wealthiest of the fleet).", "stats": {"Type": "Stateless nomadic fleet", "Homeworld": "None — they are a fleet", "Fleet seat": "XA5-066 pulsar belt (Aldeesa)", "Fleet size": "~60 vessels (mixed make)", "Population": "~2 million (draft)", "Government": "Plutocracy — Master of the Ledger", "Head of state": "Grixx Talm (provisional)", "Economy": "Gori Bank · Gori Trade Units", "Treaty": "Vadeelan Nebula (mutual defence)", "Ambassador": "Evelyn Sterling", "Charted": "2022 (DASF recon)", "Jurisdiction": "Sovereign — no Denebolian law aboard"}}, "Demma_System": {"x": 1791.44, "y": 793.36, "faction": "neutral", "tag": "Demma System · Tuatha", "body": "A system associated with the Tuatha.", "stats": {"Group": "Tuatha"}}, "Eskanta_System": {"x": 1256.19, "y": 796.1, "faction": "neutral", "tag": "Eskanta · Eskana People (Development Client)", "body": "Homeworld of the <strong>Eskana</strong> — a pre-interstellar, single-species people on an Earth-like world (one moon, 2nd of seven bodies). Over 100 nations divided by ethnicity, culture and creed, governed collectively through the <strong>Eskantan Assembly of Nations</strong> (a High Speaker leads internally, a First Delegate signs externally). During the STARS expansion era (~2021–22 N.T.) the Eskana independently decoded the Stargate dialing system and accidentally reached <strong>T.R.A.C.E.</strong> — the first offworld nation to initiate contact with Denebol, which is the precise legal basis making the relationship lawful under the Prime Directive. Technology at contact was ~1970s-equivalent (~75% of Tier I), roughly 25 points below FTL graduation — a multi-decade development arc. The <strong>Tarnic Union (Tarnis)</strong>, which unearthed the Stargate at an archaeological site, was the first-contact nation; ambitious and industrial, it resents Denebol's insistence on negotiating collectively through the Assembly — and is assessed as the least safe nation to hold a monopoly on interstellar access.", "stats": {"People": "Eskana (single species)", "Homeworld": "Eskanta (2nd of 7)", "Government": "Assembly of Nations", "Nations": "100+", "Tech tier": "~75% Tier I (1970s-eq.)", "Status": "Development client", "First contact": "~2021–22 N.T.", "Contact nation": "Tarnic Union (Tarnis)"}}, "Bedrosia": {"x": 1165.54, "y": 1173.62, "faction": "ingerdimnar", "tag": "Ingerdimnär · Inneran System", "body": "An Inneran system within Ingerdimnär space — a Praetorian remnant fragmented into AI-governed cartels.", "stats": {"Allegiance": "Ingerdimnär"}}, "Entak": {"x": 1195.04, "y": 1201.44, "faction": "ingerdimnar", "tag": "Ingerdimnär · Inneran System", "body": "An Inneran system within Ingerdimnär space.", "stats": {"Allegiance": "Ingerdimnär"}}, "Traleth": {"x": 1288.35, "y": 1206.26, "faction": "ingerdimnar", "tag": "Ingerdimnär System", "body": "An Ingerdimnär system in the contested southern frontier.", "stats": {"Allegiance": "Ingerdimnär"}}, "K_nell": {"x": 1244.16, "y": 1250.14, "faction": "ingerdimnar", "tag": "Ingerdimnär System", "body": "An Ingerdimnär system.", "stats": {"Allegiance": "Ingerdimnär"}}, "Kraynos-IV": {"x": 1399.74, "y": 1255.18, "faction": "ingerdimnar", "tag": "Ingerdimnär System", "body": "An Ingerdimnär system in the southern contested zone.", "stats": {"Allegiance": "Ingerdimnär"}}, "Rateen": {"x": 1478.83, "y": 1235.27, "faction": "ingerdimnar", "tag": "Ingerdimnär System", "body": "An Ingerdimnär system near the const svg=document.getElementById('tl-svg'),panel=document.getElementById('panel'),hint=document.getElementById('hint');
svg.setAttribute('width',VBW);svg.setAttribute('height',VBH);setStyle(svg,'width',VBW+'px');setStyle(svg,'height',VBH+'px');

let scale=1,panX=0,panY=0,minScale=0.2,maxScale=8,isDragging=false,moved=false,sx,sy,spx,spy;
function applyT(){setStyle(container,'transform',`translate(${panX}px,${panY}px) scale(${scale})`);}
function fit(){const vw=viewport.clientWidth,vh=viewport.clientHeight;scale=Math.min(vw/VBW,vh/VBH)*0.9;panX=(vw-VBW*scale)/2;panY=(vh-VBH*scale)/2;minScale=scale*0.6;applyT();}
fit();window.addEventListener('resize',fit);
function zoom(d,cx,cy){const o=scale;scale=Math.min(maxScale,Math.max(minScale,scale*(1+d)));panX=cx-(cx-panX)*(scale/o);panY=cy-(cy-panY)*(scale/o);applyT();}
viewport.addEventListener('wheel',e=>{e.preventDefault();const r=viewport.getBoundingClientRect();zoom(-e.deltaY*0.0012,e.clientX-r.left,e.clientY-r.top);},{passive:false});
viewport.addEventListener('mousedown',e=>{if(e.button!==0)return;isDragging=true;moved=false;sx=e.clientX;sy=e.clientY;spx=panX;spy=panY;viewport.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!isDragging)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)+Math.abs(dy)>4)moved=true;panX=spx+dx;panY=spy+dy;applyT();});
window.addEventListener('mouseup',()=>{isDragging=false;viewport.classList.remove('grabbing');});
let ltd=null;
viewport.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;moved=false;sx=e.touches[0].clientX;sy=e.touches[0].clientY;spx=panX;spy=panY;}if(e.touches.length===2){isDragging=false;ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
viewport.addEventListener('touchmove',e=>{if(e.touches.length===1&&isDragging){panX=spx+(e.touches[0].clientX-sx);panY=spy+(e.touches[0].clientY-sy);applyT();}if(e.touches.length===2&&ltd!=null){const dd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;zoom((dd-ltd)*0.005,cx,cy);ltd=dd;}},{passive:true});
viewport.addEventListener('touchend',()=>{isDragging=false;ltd=null;},{passive:true});
document.getElementById('zin').onclick=()=>zoom(0.3,viewport.clientWidth/2,viewport.clientHeight/2);
document.getElementById('zout').onclick=()=>zoom(-0.3,viewport.clientWidth/2,viewport.clientHeight/2);
document.getElementById('reset').onclick=fit;

const NS='http://www.w3.org/2000/svg';
function gid(id){return svg.querySelector('#'+CSS.escape(id));}
function pretty(k){return k.replace(/_/g,' ');}
function setStyle(el,prop,val){if(!el)return;if(el.style){el.style[prop]=val;}else{var cur=el.getAttribute('style')||'';var css=prop.replace(/[A-Z]/g,m=>'-'+m.toLowerCase());var re2=new RegExp(css+'\\s*:[^;]*;?','g');cur=cur.replace(re2,'');el.setAttribute('style',cur+';'+css+':'+val);}}

// ---- PLANET / SYSTEM HOTSPOTS (attach to real SVG circles) ----
       const hotLayer=document.createElementNS(NS,'g');hotLayer.setAttribute('id','tl-hotspots');svg.appendChild(hotLayer);
       const NOCIRCLE=['Magellan_Void','Lal_Nebula'];
       // Build hover rings (visual only) and a coordinate index for delegated clicks
       const PLANET_IDX=[];
       Object.entries(INFO).forEach(([key,d])=>{
         const ring=document.createElementNS(NS,'circle');
         ring.setAttribute('cx',d.x);ring.setAttribute('cy',d.y);ring.setAttribute('r',16);
         ring.setAttribute('fill','none');ring.setAttribute('stroke',FCOLOR[d.faction]);
         ring.setAttribute('stroke-width',2.5);ring.setAttribute('opacity',0);
         ring.setAttribute('pointer-events','none');
         setStyle(ring,'transition','opacity .15s, r .15s, stroke-width .15s');
         hotLayer.appendChild(ring);
         PLANET_IDX.push({key:key,x:d.x,y:d.y,ring:ring,r:NOCIRCLE.indexOf(key)>-1?42:18});
       });
       // Convert a screen point to SVG user coords
       function toSvgPoint(clientX,clientY){
         const pt=svg.createSVGPoint();pt.x=clientX;pt.y=clientY;
         const ctm=svg.getScreenCTM();
         if(!ctm)return null;
         return pt.matrixTransform(ctm.inverse());
       }
       function nearestPlanet(clientX,clientY){
         const p=toSvgPoint(clientX,clientY);if(!p)return null;
         let best=null,bestD=Infinity;
         for(const it of PLANET_IDX){
           const dx=p.x-it.x,dy=p.y-it.y,dist=Math.sqrt(dx*dx+dy*dy);
           if(dist<=it.r && dist<bestD){best=it;bestD=dist;}
         }
         return best;
       }
       // Hover: show ring for nearest planet under cursor
       let _hovered=null;
       viewport.addEventListener('mousemove',ev=>{
         if(getComputedStyle(hotLayer).display==='none')return;
         const hit=nearestPlanet(ev.clientX,ev.clientY);
         if(hit!==_hovered){
           if(_hovered){_hovered.ring.setAttribute('opacity',0);_hovered.ring.setAttribute('r',16);_hovered.ring.setAttribute('stroke-width',2.5);}
           if(hit){hit.ring.setAttribute('opacity',0.95);hit.ring.setAttribute('r',14);hit.ring.setAttribute('stroke-width',3);}
           _hovered=hit;
         }
       });
       // Click: open popup for nearest planet (delegated on svg)
       svg.addEventListener('click',ev=>{
         if(moved)return;
         const disp=getComputedStyle(hotLayer).display;
         if(disp==='none')return;
         const hit=nearestPlanet(ev.clientX,ev.clientY);
         if(hit){
           ev.stopPropagation();
           hit.ring.setAttribute('opacity',0.95);hit.ring.setAttribute('r',10);hit.ring.setAttribute('stroke-width',3.5);
           openInfo(hit.key);
         }
       });

// SECTORS = {sectors:{...}, catchall:{...}, all_svg:[...]}
const SECTOR_DATA=SECTORS.sectors;
const SECTOR_CATCHALL=SECTORS.catchall;
const SECTOR_KEYS=SECTORS.all_svg;
const CHART_CLASS={'Fully Charted':'accord','Partially Charted':'gori','Uncharted':'neutral','Uncharted Space':'neutral','UNCHARTED SPACE':'neutral'};
function setupSectors(){
 const gs=gid('Galactic_Sectors');if(!gs)return;
 SECTOR_KEYS.forEach(name=>{
  let grp=gid(name);if(!grp)return;
  const poly=grp.querySelector('polygon');if(!poly)return;
  poly.classList.add('tl-sector-hit');
  const d=SECTOR_DATA[name];
  if(d&&d.fkey==='accord')poly.classList.add('accord');
  setStyle(poly,'pointerEvents','all');
  poly.addEventListener('click',ev=>{if(moved)return;ev.stopPropagation();openSector(name);});
 });
}

// ---- INFO PANEL ----
function openInfo(key){
 const d=INFO[key];
 panel.className='open f-'+d.faction;
 document.getElementById('p-tag').textContent=d.tag;
 document.getElementById('p-name').textContent=pretty(key);
 document.getElementById('p-body').innerHTML=d.body;
 let s='';for(const[k,v]of Object.entries(d.stats||{}))s+=`<div>${k}</div><div class="v">${v}</div>`;
 document.getElementById('p-stats').innerHTML=s;
 document.getElementById('p-link').innerHTML=d.link?`<a href="${d.link}" target="_blank" rel="noopener">${d.linkLabel||'Open page →'}</a>`:'';
 hint.style.opacity='0';
}
function openSector(name){
 const d=SECTOR_DATA[name]||SECTOR_CATCHALL;
 const fkey=d.fkey||'neutral';
 panel.className='open f-'+fkey;
 // tag line from political role
 document.getElementById('p-tag').textContent=(d.polrole&&d.polrole!=='Unknown')?d.polrole:'Galactic Sector';
 document.getElementById('p-name').textContent=pretty(name)+' Sector';
 // body: short narrative line summarising jurisdiction + charting
 let body;
 if(!SECTOR_DATA[name]){
  body='Beyond the documented frontier. This sector has not been formally surveyed or catalogued by the Accord — its systems, jurisdiction and status remain <strong>unknown</strong>.';
 }else{
  const juris=(d.assoc&&d.assoc!=='—'&&d.assoc!=='None')?'under the jurisdiction of <strong>'+d.assoc+'</strong>':'with <strong>no recognised jurisdiction</strong>';
  body=pretty(name)+' is a <strong>'+(d.polrole||'sector').toLowerCase()+'</strong>, '+juris+'. Charting status: <strong>'+d.charting+'</strong>.';
 }
 document.getElementById('p-body').innerHTML=body;
 // full stat block
 const rows=[
  ['Scope of Control',d.scope],
  ['Planets / Systems',d.planets],
  ['Controlled',d.controlled],
  ['Jurisdiction Claimed',d.claimed],
  ['Jurisdiction',d.assoc],
  ['Charting Status',d.charting],
  ['Political Status',d.polstatus],
  ['Political Role',d.polrole],
  ['Accord Corridors',d.corridors],
  ['Influential Nations',d.influence],
 ];
 let st='';for(const[k,v]of rows){if(v===undefined||v===null||v===''||v==='nan')continue;st+=`<div>${k}</div><div class="v">${v}</div>`;}
 document.getElementById('p-stats').innerHTML=st;
 hint.style.opacity='0';
}

const LAYER_LABELS={Radial_Grid:'Coordinate Grid',Galactic_Sectors:'Galactic Sectors',Terriotries:'Territories',Planets:'Systems & Planets',Corridors:'Trade Corridors',Stargates:'Stargate Network',Uncharted_Space:'Uncharted Space'};
const CORRIDOR_SUBS={Green_Lane:'Green Lane',Amber_Lane:'Amber Lane',Red_Line:'Red Line',Closed_Line:'Closed Line',Corridor_Hub_Tier_I_:'Hub Tier I',Corridor_Hub_Tier_II_:'Hub Tier II',Corridor_Hub_Tier_III_:'Hub Tier III'};
const STARGATE_SUBS={'C.A.S.T.':'C.A.S.T. Network',Stolen_backward_engineered:'Stolen / Back-Engineered',Diplomatic:'Diplomatic Gates'};
// year subgroups per category: [svg group id, display year]
const STARGATE_YEARS={
 'C.A.S.T.':[['_2019','2019'],['_2020-2','2020'],['_2021','2021'],['_2022','2022'],['_2023','2023'],['_2024-2','2024'],['_2025-2','2025'],['_2026','2026']],
 'Stolen_backward_engineered':[['_2020','2020'],['_2024','2024'],['_2025','2025']],
 'Diplomatic':[['_2022-2','2022'],['_2023-2','2023'],['_2024-3','2024'],['_2025-3','2025']]
};

// Some logical layers map to multiple SVG group ids.
const LAYER_ALIAS={
 'Markers':['Markers-2','Anomalies','Anomalies-2'],   // anomalies & zones (NSZ, voids, black hole, supernova, Ytterby-7)
};
function setLayer(id,on){
 const targets=LAYER_ALIAS[id]||[id];
 targets.forEach(t=>{const n=gid(t);if(n)setStyle(n,'display',on?'':'none');});
}

let currentDoc='political';
function applyDoc(doc){
 currentDoc=doc;
 const cfg=DOCS[doc];
 // turn all known layers off, then on per config
 Object.keys(LAYER_LABELS).forEach(id=>setLayer(id,false));
 cfg.on.forEach(id=>setLayer(id,true));
 // hotspots visible only when Planets on
 setStyle(hotLayer,'display',cfg.on.includes('Planets')?'':'none');
 buildLayerPanel(doc);buildLegend(doc);
 const titles={political:'Political Chart',sectors:'Galactic Sectors',trade:'Trade & Travel Network',stargate:'Stargate Network'};
 document.getElementById('doc-title').textContent=titles[doc];
 document.querySelectorAll('.doc-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-doc')===doc));
 closePanel();
 if(typeof tcAfterDoc==='function')tcAfterDoc(doc);
}

function mkRow(label,on,onToggle,sub){
 const row=document.createElement('div');row.className='layer-row'+(sub?' layer-sub':'');
 row.innerHTML=`<div class="layer-check ${on?'on':''}">${on?'✓':''}</div><span>${label}</span>`;
 row.onclick=()=>{const c=row.querySelector('.layer-check');const now=c.classList.toggle('on');c.textContent=now?'✓':'';onToggle(now);};
 return row;
}
function buildLayerPanel(doc){
 const list=document.getElementById('layer-list');list.innerHTML='';
 const cfg=DOCS[doc];
 const base=[...cfg.on];
 // main layers for this doc
 base.forEach(id=>{ if(LAYER_LABELS[id]) list.appendChild(mkRow(LAYER_LABELS[id],true,on=>setLayer(id,on))); });
 // doc-specific sublayers
 if(doc==='trade'){
  const h=document.createElement('h3');h.textContent='Corridor Classes';h.style.marginTop='10px';list.appendChild(h);
  Object.entries(CORRIDOR_SUBS).forEach(([id,lab])=>{setLayer(id,true);list.appendChild(mkRow(lab,true,on=>setLayer(id,on),true));});
  tcBuildPanel(list);
 }
 if(doc==='stargate'){
  const h=document.createElement('h3');h.textContent='Gate Categories';h.style.marginTop='10px';list.appendChild(h);
  Object.entries(STARGATE_SUBS).forEach(([id,lab])=>{
   setLayer(id,true);
   // category toggle — turns the whole category (and all its year rows) on/off
   const catRow=mkRow(lab,true,on=>{
     setLayer(id,on);
     // sync the year checkboxes under this category visually + functionally
     (STARGATE_YEARS[id]||[]).forEach(([yid])=>{
       const yr=list.querySelector('[data-yid="'+yid+'"]');
       if(yr){const c=yr.querySelector('.layer-check');c.classList.toggle('on',on);c.textContent=on?'✓':'';}
       setLayer(yid,on);
     });
   });
   list.appendChild(catRow);
   // nested year rows
   (STARGATE_YEARS[id]||[]).forEach(([yid,yr])=>{
     setLayer(yid,true);
     const row=document.createElement('div');row.className='layer-row layer-sub';row.style.paddingLeft='14px';row.setAttribute('data-yid',yid);
     row.innerHTML='<div class="layer-check on">✓</div><span style="font-family:\'Share Tech Mono\',monospace;font-size:.66rem">'+yr+'</span>';
     row.onclick=()=>{const c=row.querySelector('.layer-check');const now=c.classList.toggle('on');c.textContent=now?'✓':'';setLayer(yid,now);};
     list.appendChild(row);
   });
  });
 }
}

function buildLegend(doc){

 const add=(html)=>{b.insertAdjacentHTML('beforeend',html);};
 if(doc==='political'){
  [['#5a9ef0','Denebolian Republic'],['#40c0e0','Accord Core / Shared'],['#4060d0','Kingdom of Arnor'],['#c060c0','Fifth Praetorian Belt'],['#a040e0','Draconis Empire'],['#e05050','Ingerdimnär'],['#f0a040','Gori Merchant Fleet']].forEach(([c,l])=>add(`<div class="leg-row"><div class="leg-dot" style="background:${c}"></div><div class="leg-label">${l}</div></div>`));

  [['#39b54a','Green Lane — open, full speed'],['#fbb03b','Amber Lane — caution, medium'],['#ed1e79','Red Line — restricted, medium'],['#444','Closed Line — no transit']].forEach(([c,l])=>add(`<div class="leg-row"><div class="leg-line" style="background:${c}"></div><div class="leg-label">${l}</div></div>`));

  add(`<div class="leg-row"><div class="leg-dot" style="background:#7eb8ff"></div><div class="leg-label">C.A.S.T. network</div></div>`);

function tcUnch(core,expl){var f=0.15+(core-1)*(0.55/9); if(expl)f+=0.25; return Math.max(0.10,Math.min(0.95,f));} // uncharted speed factor
function tcCanClosed(core,expl){return expl||core>=8;}   // Closed-lane (military) transit

let tcCore=5, tcExpl=false;

function tcD(a,b){return Math.hypot(a.x-b.x,a.y-b.y)*TC_LYPX;}
function tcFmtLy(ly){return Math.round(ly).toLocaleString()+' ly';}

function tcGraph(mil){var g={};TCD.CORR.forEach(function(e){var f=e[0],t=e[1],lane=e[2];if(lane==='Closed'&&!mil)return;var a=TC_PLACES[f],b=TC_PLACES[t];if(!a||!b)return;var w=tcD(a,b);(g[f]=g[f]||[]).push({to:t,w:w,type:'corr',lane:lane});(g[t]=g[t]||[]).push({to:f,w:w,type:'corr',lane:lane});});return g;}
function tcNearestPlace(pt,rad){var best=null,bd=rad;for(var k in TC_PLACES){var p=TC_PLACES[k];var d=Math.hypot(pt.x-p.x,pt.y-p.y);if(d<bd){bd=d;best=k;}}return best;}
function tcSegDist(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay,L=dx*dx+dy*dy;if(L===0)return Math.hypot(px-ax,py-ay);var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/L));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}
function tcSnap(pt){var bn=null,bnd=1e18;for(var k in TCD.NODE){var p=TCD.NODE[k];var dd=Math.hypot(pt.x-p.x,pt.y-p.y);if(dd<bnd){bnd=dd;bn=k;}}if(bnd<=TC_SNAP_NODE)return bn;var bld=1e18;for(var i=0;i<TCD.CORR.length;i++){var f=TC_PLACES[TCD.CORR[i][0]],t=TC_PLACES[TCD.CORR[i][1]];if(!f||!t)continue;var ds=tcSegDist(pt.x,pt.y,f.x,f.y,t.x,t.y);if(ds<bld)bld=ds;}return bld<=TC_SNAP_LANE?bn:null;}
function tcDij(adj,s,t){
  if(!adj[s]||!adj[t])return null;
  var dist={},prev={},vis={};dist[s]=0;var pq=[[0,s]];
  while(pq.length){pq.sort(function(a,b){return a[0]-b[0];});var top=pq.shift(),du=top[0],u=top[1];if(vis[u])continue;vis[u]=1;if(u===t)break;(adj[u]||[]).forEach(function(e){var nd=du+e.w;if(dist[e.to]===undefined||nd<dist[e.to]){dist[e.to]=nd;prev[e.to]={n:u,lane:e.lane};pq.push([nd,e.to]);}});}
  if(dist[t]===undefined)return null;
  var seq=[t],lanes=[],c=t;while(prev[c]){lanes.unshift(prev[c].lane);seq.unshift(prev[c].n);c=prev[c].n;}
  return {seq:seq,lanes:lanes,ly:dist[t]};
}
function tcResolve(s){if(s.kind==='place'){var p=TC_PLACES[s.key];return {x:p.x,y:p.y,label:s.key,key:s.key,net:!!(TCD.NODE[s.key]),custom:false};}return {x:s.x,y:s.y,label:s.label,key:null,net:false,custom:true};}
function tcChain(){return tcStops.map(tcResolve);}
function tcMainSet(g){var seen={},best=[];for(var n in g){if(seen[n])continue;var st=[n],c=[];while(st.length){var u=st.pop();if(seen[u])continue;seen[u]=1;c.push(u);(g[u]||[]).forEach(function(e){if(!seen[e.to])st.push(e.to);});}if(c.length>best.length)best=c;}var set={};best.forEach(function(k){set[k]=1;});return set;}
function tcNearestMain(pt,mainSet){var bn=null,bd=1e18;for(var k in mainSet){var p=TC_PLACES[k];var dd=Math.hypot(pt.x-p.x,pt.y-p.y);if(dd<bd){bd=dd;bn=k;}}return bn;}

function tcPlan(){
  var chain=tcChain();
  if(chain.length<2)return {stops:chain,legs:[],totalLy:0,totalDays:0,mode:'need',warn:[],direct:0};
  var uncF=tcUnch(tcCore,tcExpl);
  var unchSpeed=TC_UNCH_MAX*uncF;
  var closedAllowed=tcOpt.mil&&tcCanClosed(tcCore,tcExpl);
  var res={stops:chain,legs:[],totalLy:0,totalDays:0,lanecount:{Green:0,Amber:0,Red:0,Closed:0},warn:[],direct:0,pathNodes:[],mode:tcOpt.corr?'corr':'free'};
  for(var i=0;i<chain.length-1;i++)res.direct+=tcD(chain[i],chain[i+1]);
  var g=tcOpt.corr?tcGraph(closedAllowed):null;
  var mainSet=g?tcMainSet(g):{};
  function addFree(A,B){var ly=tcD(A,B);res.legs.push({type:'free',a:A,b:B,ly:ly});res.totalLy+=ly;res.totalDays+=ly/unchSpeed;}
  function addCorr(a,b,lane){var ly=tcD(a,b);res.legs.push({type:'corr',a:a,b:b,lane:lane,ly:ly});res.totalLy+=ly;res.totalDays+=ly/(TC_LANE_SPEED[lane]||TC_LANE_SPEED.Green);res.lanecount[lane]=(res.lanecount[lane]||0)+1;}
  for(var i=0;i<chain.length-1;i++){
    var A=chain[i],B=chain[i+1];
    // Free drawing, or any leg touching a hand-placed open-space point -> direct uncharted.
    if(!tcOpt.corr||A.custom||B.custom){addFree(A,B);continue;}
    // Both endpoints are named systems: ride the corridor network through charted space,
    // anchoring a frontier/off-network system to its nearest lane node via an uncharted approach hop.
    var anchorA=(A.key&&g[A.key])?A.key:tcNearestMain(A,mainSet);
    var anchorB=(B.key&&g[B.key])?B.key:tcNearestMain(B,mainSet);
    var dj=(anchorA&&anchorB)?tcDij(g,anchorA,anchorB):null;
    if(!dj){addFree(A,B);continue;}
    if(A.key!==anchorA)addFree(A,TC_PLACES[anchorA]);
    for(var e=0;e<dj.seq.length-1;e++){addCorr(TC_PLACES[dj.seq[e]],TC_PLACES[dj.seq[e+1]],dj.lanes[e]);}
    dj.seq.forEach(function(n){res.pathNodes.push(n);});
    if(B.key!==anchorB)addFree(TC_PLACES[anchorB],B);
  }
  if(res.lanecount.Closed)res.warn.push(res.lanecount.Closed+' Closed lane(s) \u00b7 military transit');
  if(res.lanecount.Amber||res.lanecount.Red)res.warn.push((res.lanecount.Amber+res.lanecount.Red)+' caution lane(s) (Amber/Red)');
  if(res.legs.some(function(l){return l.type==='free';}))res.warn.push('Off-corridor legs \u2014 uncharted space \u00b7 '+Math.round(unchSpeed)+' ly/day');
  if(tcOpt.mil&&!tcCanClosed(tcCore,tcExpl))res.warn.push('Core mk'+tcCore+' cannot transit Closed lanes (needs mk8+ or exploration vessel)');
  return res;
}

function tcDiamond(p,color,r){var d=document.createElementNS(NS,'path');var x=p.x,y=p.y;d.setAttribute('d','M'+x+' '+(y-r)+'L'+(x+r)+' '+y+'L'+x+' '+(y+r)+'L'+(x-r)+' '+y+'Z');d.setAttribute('fill',color);d.setAttribute('stroke','#02060f');d.setAttribute('stroke-width',1.5);return d;}
function tcLabel(p,txt,color){var t=document.createElementNS(NS,'text');t.setAttribute('x',p.x+9);t.setAttribute('y',p.y-9);t.setAttribute('fill',color);t.setAttribute('font-family',"'Share Tech Mono',monospace");t.setAttribute('font-size','13');t.setAttribute('stroke','#02060f');t.setAttribute('stroke-width','0.7');t.setAttribute('paint-order','stroke');t.textContent=txt;return t;}
function tcDrawRoute(res){
  tcClearRoute();if(!res)return;
  res.legs.forEach(function(leg){var col=leg.type==='free'?TC_FREECOLOR:(TC_LANECOLOR[leg.lane]||'#5a9ef0');tcRoute.appendChild(tcLine(leg.a,leg.b,col,false,9,0.16));});
  res.legs.forEach(function(leg){var col=leg.type==='free'?TC_FREECOLOR:(TC_LANECOLOR[leg.lane]||'#5a9ef0');tcRoute.appendChild(tcLine(leg.a,leg.b,col,leg.type==='free',3.6,0.95));});
  (res.pathNodes||[]).forEach(function(n){var p=TC_PLACES[n];if(p)tcRoute.appendChild(tcDot(p,'#0a1830',3.4));});
  var st=res.stops||[];
  st.forEach(function(s,i){
    if(i===0){tcRoute.appendChild(tcDot(s,'#39b54a',6));tcRoute.appendChild(tcLabel(s,s.label,'#c8ffd0'));}
    else if(i===st.length-1){tcRoute.appendChild(tcDot(s,'#ff5a7a',6));tcRoute.appendChild(tcLabel(s,s.label,'#ffd0d8'));}
    else{tcRoute.appendChild(tcDiamond(s,'#fbb03b',6));tcRoute.appendChild(tcLabel(s,i+'\u00b7 '+s.label,'#ffe0a0'));}
  });
}
function tcFocus(res){if(!res||!res.legs.length)return;var minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;res.legs.forEach(function(l){[l.a,l.b].forEach(function(p){minx=Math.min(minx,p.x);miny=Math.min(miny,p.y);maxx=Math.max(maxx,p.x);maxy=Math.max(maxy,p.y);});});var pad=140;minx-=pad;miny-=pad;maxx+=pad;maxy+=pad;var vw=viewport.clientWidth,vh=viewport.clientHeight,bw=maxx-minx,bh=maxy-miny;scale=Math.min(maxScale,Math.max(minScale,Math.min(vw/bw,vh/bh)));panX=vw/2-((minx+maxx)/2)*scale;panY=vh/2-((miny+maxy)/2)*scale;applyT();}
function tcReadout(res){
  if(!res)return '';
  if(res.mode==='need')return '<div class="tc-big">\u2014</div><div class="tc-sub">Set a start (dropdown) or click the map to begin the path.</div>';
  var modeLabel=res.mode==='free'?'Free drawing \u00b7 uncharted space':'Snap to network \u00b7 free beyond the frontier';
  var stops=res.stops||[],uncF=tcUnch(tcCore,tcExpl);
  var h='<div class="tc-big">'+tcDays(res.totalDays)+'</div>';
  h+='<div class="tc-sub">'+tcFmtLy(res.totalLy)+' \u00b7 '+modeLabel+' \u00b7 '+stops.length+' stops</div>';
  var unchSpeed=TC_UNCH_MAX*uncF;h+='<div class="tc-sub tc-ref">Computer core mk'+tcCore+(tcExpl?' \u00b7 exploration vessel':'')+' \u00b7 uncharted '+Math.round(unchSpeed)+' ly/day</div>';
  if(res.mode==='corr'){var lc=res.lanecount||{},parts=[];['Green','Amber','Red','Closed'].forEach(function(k){if(lc[k])parts.push('<span class="tc-tag tc-'+k.toLowerCase()+'">'+lc[k]+' '+k+'</span>');});if(parts.length)h+='<div class="tc-lanes">'+parts.join('')+'</div>';}
  h+='<div class="tc-chain">'+stops.map(function(s){return s.label;}).join(' \u2192 ')+'</div>';
  (res.warn||[]).forEach(function(w){h+='<div class="tc-warn">\u26a0 '+w+'</div>';});
  return h;
}
function tcRender(focus){var res=tcPlan();tcLastRes=res;tcDrawRoute(res);var out=document.getElementById('tc-out');if(out)out.innerHTML=tcReadout(res);if(focus)tcFocus(res);}

/* --- map picking: append to end (first click seeds start if empty) --- */
function tcToSvg(cx,cy){var pt=svg.createSVGPoint();pt.x=cx;pt.y=cy;var m=svg.getScreenCTM();if(!m)return null;var p=pt.matrixTransform(m.inverse());return {x:p.x,y:p.y};}
function tcClickAdd(ev){
  if(!tcPick||moved)return;var pt=tcToSvg(ev.clientX,ev.clientY);if(!pt)return;ev.stopPropagation();
  var snapKey=tcOpt.corr?tcSnap(pt):null;   // snap only in 'snap to network' mode, and only inside controlled space
  var last=tcStops[tcStops.length-1];
  if(snapKey&&last&&last.kind==='place'&&last.key===snapKey)return;   // skip duplicate consecutive system
  var stop=snapKey?{kind:'place',key:snapKey}:{kind:'point',x:Math.round(pt.x*100)/100,y:Math.round(pt.y*100)/100,label:'Pt'+(++tcPtCounter)};
  tcStops.push(stop);tcRenderStops();tcSyncStart();tcRender(false);
}
svg.addEventListener('click',tcClickAdd,true);
function tcSetPick(on){tcPick=on;viewport.classList.toggle('tc-picking',on);var b=document.getElementById('tc-pick');if(b){b.classList.toggle('tc-pick-on',on);b.textContent=on?'\u25cf Click map to extend \u2014 done':'\uff0b Build path on map';}if(on){hint.textContent=(tcOpt.corr?'CLICK TO EXTEND \u00b7 SNAPS IN CHARTED SPACE, FREE BEYOND':'CLICK TO EXTEND \u00b7 FREE DRAWING (UNCHARTED)')+' \u00b7 ESC TO FINISH';hint.style.opacity='1';}else{hint.style.opacity='0';}}
window.addEventListener('keydown',function(e){if(e.key==='Escape'&&tcPick)tcSetPick(false);});
function tcSyncStart(){var s=document.getElementById('tc-start');if(s)s.value=(tcStops[0]&&tcStops[0].kind==='place')?tcStops[0].key:'';}

function tcRenderStops(){
  var box=document.getElementById('tc-stoplist');if(!box)return;box.innerHTML='';
  tcStops.forEach(function(s,i){
    var row=document.createElement('div');row.className='tc-wp';
    var role=(i===0)?'\u25c9 start':(i===tcStops.length-1?'\u25ce end':'\u25c7 stop');
    var lab=(s.kind==='place')?s.key:s.label;
    var name=document.createElement('span');name.innerHTML='<b style="color:#5a7a9a;font-weight:400">'+role+'</b> '+lab;row.appendChild(name);
    var x=document.createElement('span');x.className='tc-x';x.textContent='\u2715';x.onclick=function(){tcStops.splice(i,1);tcRenderStops();tcSyncStart();tcRender(false);};row.appendChild(x);
    box.appendChild(row);
  });
}
function tcToggle(label,on,cb,dis){var row=document.createElement('div');row.className='tc-toggle'+(on?' on':'')+(dis?' dis':'');row.innerHTML='<div class="tc-box">'+(on&&!dis?'\u2713':'')+'</div><span>'+label+'</span>';row.onclick=function(){if(dis)return;var now=!row.classList.contains('on');row.classList.toggle('on',now);row.querySelector('.tc-box').textContent=now?'\u2713':'';cb(now);};return row;}
function tcBuildPanel(list){
  var h=document.createElement('h3');h.textContent='Travel Calculator';h.style.marginTop='12px';list.appendChild(h);
  var keys=Object.keys(TC_PLACES).sort(function(a,b){return a.localeCompare(b);});
  var wrap=document.createElement('div');wrap.className='tc-wrap';
  // computer core
  var rowC=document.createElement('div');rowC.className='tc-field';rowC.innerHTML='<label>Computer core</label>';
  var cc=document.createElement('select');cc.className='tc-sel';cc.id='tc-core';
  for(var m=TC_CORE_MIN;m<=TC_CORE_MAX;m++){var o=document.createElement('option');o.value=m;o.textContent='mk'+m;if(m===tcCore)o.selected=true;cc.appendChild(o);}
  cc.onchange=function(){tcCore=parseInt(cc.value,10);buildLayerPanel('trade');};
  rowC.appendChild(cc);wrap.appendChild(rowC);
  // exploration vessel
  wrap.appendChild(tcToggle('Exploration vessel',tcExpl,function(v){tcExpl=v;buildLayerPanel('trade');}));
  // start
  var rowS=document.createElement('div');rowS.className='tc-field';rowS.innerHTML='<label>Start</label>';
  var ss=document.createElement('select');ss.className='tc-sel';ss.id='tc-start';var sph=document.createElement('option');sph.value='';sph.textContent='\u2014 set start \u2014';ss.appendChild(sph);
  keys.forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=(TCD.NODE[k]?'':'\u00b7 ')+k;if(tcStops[0]&&tcStops[0].kind==='place'&&tcStops[0].key===k)o.selected=true;ss.appendChild(o);});
  ss.onchange=function(){if(!ss.value)return;if(tcStops.length===0)tcStops=[{kind:'place',key:ss.value}];else tcStops[0]={kind:'place',key:ss.value};tcRenderStops();tcRender(false);};
  rowS.appendChild(ss);wrap.appendChild(rowS);
  // add stop
  var rowA=document.createElement('div');rowA.className='tc-field';rowA.innerHTML='<label>Add stop (append)</label>';
  var sa=document.createElement('select');sa.className='tc-sel';sa.id='tc-add';var ph=document.createElement('option');ph.value='';ph.textContent='\uff0b add a system\u2026';sa.appendChild(ph);
  keys.forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=(TCD.NODE[k]?'':'\u00b7 ')+k;sa.appendChild(o);});
  sa.onchange=function(){if(sa.value){tcStops.push({kind:'place',key:sa.value});sa.value='';tcRenderStops();tcSyncStart();tcRender(false);}};
  rowA.appendChild(sa);wrap.appendChild(rowA);
  // build on map
  var pickBtn=document.createElement('button');pickBtn.className='tc-btn';pickBtn.id='tc-pick';pickBtn.style.width='100%';pickBtn.style.marginTop='4px';pickBtn.textContent=tcPick?'\u25cf Click map to extend \u2014 done':'\uff0b Build path on map';if(tcPick)pickBtn.classList.add('tc-pick-on');pickBtn.onclick=function(){tcSetPick(!tcPick);};wrap.appendChild(pickBtn);
  var sl=document.createElement('div');sl.id='tc-stoplist';sl.style.marginTop='4px';wrap.appendChild(sl);
  // clear (prominent)
  var bclr=document.createElement('button');bclr.className='tc-clear';bclr.textContent='\u2715 Clear all points';bclr.onclick=function(){tcStops=[];tcSetPick(false);tcRenderStops();tcSyncStart();tcRender(false);};wrap.appendChild(bclr);
  // toggles
  wrap.appendChild(tcToggle('Snap to corridors/systems',tcOpt.corr,function(v){tcOpt.corr=v;tcSetPick(tcPick);tcRender(false);}));
  var canClosed=tcCanClosed(tcCore,tcExpl);
  wrap.appendChild(tcToggle('Use Closed lanes (military)',tcOpt.mil&&canClosed,function(v){tcOpt.mil=v;tcRender(false);},!canClosed));
  // buttons
  var btns=document.createElement('div');btns.className='tc-btns';
  var bplot=document.createElement('button');bplot.className='tc-btn';bplot.textContent='Plot course';bplot.onclick=function(){tcRender(true);};
  var brev=document.createElement('button');brev.className='tc-btn tc-btn2';brev.textContent='\u21c4';brev.title='Reverse path';brev.onclick=function(){tcStops.reverse();tcRenderStops();tcSyncStart();tcRender(false);};
  btns.appendChild(bplot);btns.appendChild(brev);wrap.appendChild(btns);
  var out=document.createElement('div');out.className='tc-out';out.id='tc-out';wrap.appendChild(out);
  list.appendChild(wrap);
  tcRenderStops();tcRender(false);
}
function tcAfterDoc(doc){if(doc!=='trade'){tcClearRoute();tcSetPick(false);}}
/* ===== END TRAVEL CALCULATOR ===== */

// init
setupSectors();
applyDoc('political');
</script>
